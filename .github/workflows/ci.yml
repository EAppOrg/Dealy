name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Typecheck, Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dealy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dealy_test?schema=public
      AUTH_SECRET: ci-test-secret-not-for-production
      AUTH_TRUST_HOST: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: cd packages/db && npx prisma generate

      - name: Apply migrations to test database
        run: cd packages/db && npx prisma migrate deploy

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  e2e:
    name: Browser E2E
    runs-on: ubuntu-latest
    needs: ci

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dealy
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dealy?schema=public
      AUTH_SECRET: ci-test-secret-not-for-production
      AUTH_TRUST_HOST: true
      NEXT_PUBLIC_APP_NAME: Dealy
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: cd packages/db && npx prisma generate

      - name: Apply migrations
        run: cd packages/db && npx prisma migrate deploy

      - name: Seed database
        run: cd packages/db && npx prisma db seed

      - name: Build app
        run: cd apps/web && npx next build

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start app and run E2E tests
        run: |
          cd apps/web
          npx next start --port 3000 &
          sleep 5
          npx playwright test --reporter=github
